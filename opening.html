<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Chalet';
            src: url('./font/Chalet-Thin.ttf') format('truetype');
            font-weight: 100;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Chalet';
            src: url('./font/Chalet-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Buffon-Bold';
            src: url('./font/Buffon-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Chalet', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f2f0e9;
            overflow-x: hidden;
            height: 450vh;
            margin: 0;
            padding: 0;
        }

        .border-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            border: 14px solid #000000;
            pointer-events: none;
            z-index: 100;
        }

        .container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .text-wrapper {
            position: absolute;
            white-space: nowrap;
            will-change: transform;
            right: 0;
            transform: translateX(100%);
        }

        .large-text {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: bold;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #000;
            display: inline-block;
            font-family: 'Buffon-Bold', 'Chalet', sans-serif;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 14px;
            z-index: 200;
            font-family: 'Chalet', sans-serif;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .scroll-indicator.hidden {
            opacity: 0;
        }

        /* Falling icons container */
        .falling-icons {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 50;
            pointer-events: none;
        }

        .falling-icon {
            position: absolute;
            width: 80px;
            height: 80px;
            opacity: 0;
            will-change: transform, opacity;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        .falling-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* Fade out effect when scroll is complete */
        body.transition-out {
            animation: fadeOut 0.5s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="border-frame"></div>

    <div class="falling-icons-container falling-icons"></div>

    <div class="container">
        <div class="text-wrapper">
            <span class="large-text">Howdy, I'm Naz/Nazzy/Nazarena</span>
        </div>
    </div>

    <div class="scroll-indicator">Scroll to continue</div>

    <script>
        const textWrapper = document.querySelector('.text-wrapper');
        const scrollIndicator = document.querySelector('.scroll-indicator');
        const fallingIconsContainer = document.querySelector('.falling-icons-container');
        const body = document.body;

        // Configuration
        const maxScroll = document.body.scrollHeight - window.innerHeight;
        const numberOfIcons = 15; // Number of icons to create

        // Create falling icons
        const fallingIcons = [];
        for (let i = 0; i < numberOfIcons; i++) {
            const iconWrapper = document.createElement('div');
            iconWrapper.className = 'falling-icon';

            const img = document.createElement('img');
            img.src = './img/oneicon.png';
            img.alt = 'Pixel icon';

            iconWrapper.appendChild(img);

            // Random positions spread across the viewport
            const startX = Math.random() * (window.innerWidth - 100);
            const startY = -200 - (i * 150); // Start above viewport, staggered

            iconWrapper.style.left = startX + 'px';
            iconWrapper.style.top = startY + 'px';

            fallingIconsContainer.appendChild(iconWrapper);

            // Store icon data for animation
            fallingIcons.push({
                element: iconWrapper,
                startX: startX,
                startY: startY,
                targetX: Math.random() * (window.innerWidth - 100),
                targetY: Math.random() * (window.innerHeight - 100),
                delay: i * 0.06, // Stagger the appearance
                rotation: Math.random() * 360
            });
        }

        // Easing function for smooth animation
        function easeOutCubic(x) {
            return 1 - Math.pow(1 - x, 3);
        }

        // Scroll handler
        function handleScroll() {
            const scrolled = window.scrollY;
            const scrollProgress = Math.min(scrolled / maxScroll, 1);

            // Move text from right to left
            const translateAmount = 100 - (scrollProgress * 200);
            textWrapper.style.transform = `translateX(${translateAmount}%)`;

            // Animate falling icons
            fallingIcons.forEach((icon, index) => {
                // Calculate when this icon should start appearing
                const iconProgress = Math.max(0, (scrollProgress - icon.delay) / (1 - icon.delay));

                if (iconProgress > 0) {
                    // Easing function for smooth animation
                    const easeProgress = easeOutCubic(iconProgress);

                    // Calculate current position
                    const currentX = icon.startX + (icon.targetX - icon.startX) * easeProgress;
                    const currentY = icon.startY + (icon.targetY - icon.startY) * easeProgress;

                    // Apply transform and opacity
                    icon.element.style.transform = `translate(${currentX - icon.startX}px, ${currentY - icon.startY}px) rotate(${easeProgress * icon.rotation}deg)`;
                    icon.element.style.opacity = Math.min(easeProgress * 2, 1);
                }
            });

            // Hide scroll indicator after some scrolling
            if (scrollProgress > 0.1) {
                scrollIndicator.classList.add('hidden');
            } else {
                scrollIndicator.classList.remove('hidden');
            }

            // When scroll is complete, transition to main page
            if (scrollProgress >= 0.95) {
                body.classList.add('transition-out');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            }
        }

        // Listen for scroll events
        window.addEventListener('scroll', handleScroll, { passive: true });

        // Initial call
        handleScroll();
    </script>
</body>
</html>
